  /pricing/providers/{npi}/score:
    get:
      summary: Retrieve Provider Quality V2 score profile
      parameters:
        - name: npi
          in: path
          required: true
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
        - name: benchmark_mode
          in: query
          schema:
            type: string
            enum: [national, state, zip]
          description: |
            Benchmark perspective to read for this provider score. If omitted,
            API auto-selects the most local available mode for the selected year.
        - name: specialty
          in: query
          schema:
            type: string
          description: Optional specialty cohort override key.
        - name: taxonomy_code
          in: query
          schema:
            type: string
          description: Optional taxonomy cohort override code.
        - name: procedure_codes
          in: query
          schema:
            type: string
          description: Comma-separated procedure codes used for cohort override matching.
        - name: procedure_code_system
          in: query
          schema:
            type: string
            enum: [HP_PROCEDURE_CODE, CPT, HCPCS]
            default: HP_PROCEDURE_CODE
          description: Procedure code system for procedure_codes override resolution.
        - name: procedure_match_threshold
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 1
            default: 0.3
          description: Minimum overlap score for procedure bucket matching during cohort override.
        - name: variants_scope
          in: query
          schema:
            type: string
            enum: [provider]
          description: |
            `provider` returns provider-scoped variant score cards in `variants_by_benchmark_mode`,
            filtered to the doctor's taxonomy/procedure cohort context for each benchmark mode.
        - name: variants
          in: query
          schema:
            type: string
          deprecated: true
          description: Deprecated. Use `variants_scope=provider`.
      responses:
        '200':
          description: Provider score payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingProviderScoreResponse'
