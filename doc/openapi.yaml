          description: Optional aggregation mode for `count_only`
        - name: response_format
          in: query
          schema:
            type: string
            enum: [all, classification, full_taxonomy]
          description: Alias for `format`
        - name: show
          in: query
          schema:
            type: string
          description: Optional output view selector (for example `chain`)
        - name: start
          in: query
          schema:
            type: number
          description: Offset applied to search results (default 0)
        - name: limit
          in: query
          schema:
            type: number
          description: Maximum number of rows to return (default 50)
        - name: classification
          in: query
          schema:
            type: string
          description: NUCC classification filter
        - name: specialization
          in: query
          schema:
            type: string
          description: NUCC specialization filter
        - name: section
          in: query
          schema:
            type: string
        - name: display_name
          in: query
          schema:
            type: string
        - name: plan_network
          in: query
          schema:
            type: string
          description: Comma-separated list of plan network checksum integers
        - name: has_insurance
          in: query
          schema:
            type: string
          description: Truthy flag that filters out NPIs with empty plan networks
        - name: city
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 2
        - name: zip_code
          in: query
          schema:
            type: string
          description: ZIP/postal filter (first 5 digits)
        - name: postal_code
          in: query
          schema:
            type: string
          description: Alias for `zip_code` (first 5 digits)
        - name: phone
          in: query
          schema:
            type: string
          description: Provider phone match (digits only comparison; formatting ignored)
        - name: first_name
          in: query
          schema:
            type: string
          description: Case-insensitive fragment match for provider first name
        - name: last_name
          in: query
          schema:
            type: string
          description: Case-insensitive fragment match for provider last name
        - name: organization_name
          in: query
          schema:
            type: string
          description: Case-insensitive fragment match for organization/DBA name
        - name: entity_type_code
          in: query
