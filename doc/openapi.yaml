            type: string
          description: Comma-separated medication/prescription codes. Supports crosswalk to internal `HP_RX_CODE`.
        - name: medication_code_system
          in: query
          schema:
            type: string
            enum: [HP_RX_CODE, NDC, RXNORM]
          description: Code system for `medication_codes` (defaults to `HP_RX_CODE`)
