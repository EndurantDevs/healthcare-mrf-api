components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
      additionalProperties: true
    CountResponse:
      type: object
      properties:
        count:
          type: integer
    PharmacistBucket:
      type: object
      properties:
        pharmacist_group:
          type: string
        pharmacy_count:
          type: integer
    PharmacyPharmacistCount:
      type: object
      properties:
        pharmacy_npi:
          type: string
        pharmacy_name:
          type: string
        pharmacist_count:
          type: integer
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        page:
          type: integer
    CodeIdentifier:
      type: object
      properties:
        code_system:
          type: string
        code:
          type: string
      required: [code_system, code]
    CodeResolutionEdge:
      type: object
      properties:
        from_system:
          type: string
        from_code:
          type: string
        to_system:
          type: string
        to_code:
          type: string
        match_type:
          type: string
        confidence:
          type: number
        source:
          type: string
    CodeCatalogRecord:
      type: object
      properties:
        code_system:
          type: string
        code:
          type: string
        code_checksum:
          type: integer
        display_name:
          type: string
        short_description:
          type: string
        long_description:
          type: string
        is_active:
          type: boolean
        source:
          type: string
        updated_at:
          type: string
          format: date-time
      required: [code_system, code]
    CodeCrosswalkRecord:
      type: object
      properties:
        from_system:
          type: string
        from_code:
          type: string
        from_checksum:
          type: integer
        to_system:
          type: string
        to_code:
          type: string
        to_checksum:
          type: integer
        match_type:
          type: string
        confidence:
          type: number
        source:
          type: string
        updated_at:
          type: string
          format: date-time
      required: [from_system, from_code, to_system, to_code]
    CodeListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CodeCatalogRecord'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
        query:
          type: object
          properties:
            code_system:
              type: string
              nullable: true
            q:
              type: string
              nullable: true
            source:
              type: string
              nullable: true
            order_by:
              type: string
            order:
              type: string
              enum: [asc, desc]
    CodeRelatedResponse:
      type: object
      properties:
        input_code:
          $ref: '#/components/schemas/CodeIdentifier'
        related:
          type: object
          properties:
            forward:
              type: array
              items:
                $ref: '#/components/schemas/CodeCrosswalkRecord'
            reverse:
              type: array
              items:
                $ref: '#/components/schemas/CodeCrosswalkRecord'
          required: [forward, reverse]
    PricingLegacyFieldAliases:
      type: object
      properties:
