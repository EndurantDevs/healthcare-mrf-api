openapi: 3.0.3
info:
  title: HealthPorta Healthcare MRF API
  version: "1.0.0"
  description: |
    OpenAPI description for the HealthPorta Healthcare MRF API.  The API
    is versioned under `/api/v1` and served by a Sanic application.  All
    endpoints return JSON.  Unless noted otherwise, error responses use
    the `Error` schema.

    Data sources used by this API include:
    - CMS data portal: https://data.cms.gov/
    - CMS Physician & Other Practitioners datasets (provider/provider+service/geography+service)
    - CMS Part D Prescribers and Part D Spending by Drug datasets
    - CMS NPPES provider files: https://download.cms.gov/nppes/NPI_Files.html
    - NUCC provider taxonomy: https://www.nucc.org/index.php/code-sets-mainmenu-41/provider-taxonomy-mainmenu-40

    Claims freshness policy:
    - claims endpoints publish the most recent fully imported CMS year
    - current freshest claims year is **2023**
servers:
  - url: http://localhost:8085/api/v1
paths:
  /healthcheck/:
    get:
      summary: Health check and release metadata
      responses:
        '200':
          description: Service status payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthcheckResponse'
  /coverage/statistics:
    get:
      summary: Curated cross-domain coverage statistics for site-facing dashboards
      responses:
        '200':
          description: Flat metrics payload across marketplace, provider, procedure, pharmacy, and formulary datasets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoverageStatistics'
  /plan/:
    get:
      summary: Platform plan import status
      responses:
        '200':
          description: Summary of plan, network, and import log metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanIndexStatus'
  /plan/all:
    get:
      summary: List all plans
      responses:
        '200':
          description: Array of plan records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanRecord'
  /plan/all/variants:
    get:
      summary: List plan variants with optional pagination
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
          description: Maximum number of rows to return
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
          description: Offset to apply when paging results
      responses:
        '200':
          description: Array of plan variant summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanVariantSummary'
  /plan/network/id/{checksum}:
    get:
      summary: Fetch network details by checksum
      parameters:
        - name: checksum
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Network entry and issuer metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanNetworkEntry'
        '404':
          description: Network checksum not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /plan/network/multiple/{checksums}:
    get:
      summary: Fetch multiple network entries
      parameters:
        - name: checksums
          in: path
          required: true
          schema:
            type: string
          description: Comma-separated list of network checksum integers
      responses:
        '200':
          description: Array of network entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanNetworkEntry'
        '404':
          description: None of the requested checksums returned data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /plan/network/autocomplete:
    get:
      summary: Autocomplete plans by marketing name or plan ID
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Text fragment to match against plan marketing name or ID
        - name: state
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 2
          description: Optional two-letter state filter
        - name: zip_code
          in: query
          schema:
            type: string
          description: Optional ZIP code filter; ignored if `state` supplied
      responses:
        '200':
          description: Autocomplete payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanAutocompleteResponse'
  /plan/search:
    get:
      summary: Search plans with optional demographic filters
      parameters:
        - name: age
          in: query
          schema:
            type: integer
            minimum: 0
          description: Member age used for pricing filters
        - name: rating_area
          in: query
          schema:
            type: string
          description: Rating area identifier
        - name: zip_code
          in: query
          schema:
            type: string
          description: ZIP code value for geographic filtering
        - name: year
          in: query
          schema:
            type: integer
          description: Plan year to match
        - name: state
          in: query
          schema:
            type: string
            maxLength: 2
          description: Two-letter state filter (auto-derived from zip_code when omitted)
        - name: issuer_id
          in: query
          schema:
            type: integer
          description: Restrict results to a specific issuer
        - name: plan_id
          in: query
          schema:
            type: string
          description: Partial or full plan identifier search
        - name: q
          in: query
          schema:
            type: string
          description: Case-insensitive substring match against plan marketing name
        - name: limit
          in: query
          schema:
            type: integer
          description: Maximum number of rows per page (defaults to 100)
        - name: page
          in: query
          schema:
            type: integer
          description: 1-based page number (defaults to 1)
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
          description: Sort direction for results (defaults to asc)
        - name: order_by
          in: query
          schema:
            type: string
            enum: [plan_id, marketing_name, state, year, deductible, moop, premium_min, premium_max]
          description: Field to order by (defaults to plan_id)
        - name: premium_min
          in: query
          schema:
            type: number
          description: Minimum aggregated monthly premium allowed for the plan
        - name: premium_max
          in: query
          schema:
            type: number
          description: Maximum aggregated monthly premium allowed for the plan
        - name: has_adult_dental
          in: query
          schema:
            type: boolean
          description: Require adult dental coverage metadata
        - name: has_child_dental
          in: query
          schema:
            type: boolean
          description: Require pediatric dental coverage metadata
        - name: has_adult_vision
          in: query
          schema:
            type: boolean
          description: Require adult vision coverage metadata
        - name: has_child_vision
          in: query
          schema:
            type: boolean
          description: Require pediatric vision coverage metadata
        - name: telehealth_supported
          in: query
          schema:
            type: boolean
          description: Filter by plans that list telehealth/virtual visits in benefits
        - name: plan_types
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Repeatable or comma-separated list of plan types (HMO, PPO, etc.)
        - name: metal_levels
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Repeatable or comma-separated list of metal levels (e.g., Bronze, Silver)
        - name: csr_variations
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: CSR variation identifiers to match
        - name: is_hsa
          in: query
          schema:
            type: boolean
          description: Restrict to plans flagged as HSA-eligible
        - name: is_dental_only
          in: query
          schema:
            type: boolean
          description: Restrict to dental-only plans
        - name: is_catastrophic
          in: query
          schema:
            type: boolean
          description: Restrict to catastrophic metal level plans
        - name: is_on_exchange
          in: query
          schema:
            type: boolean
          description: Filter by plans sold on the exchange marketplace
        - name: is_off_exchange
          in: query
          schema:
            type: boolean
          description: Filter by plans sold off exchange
        - name: issuer_ids
          in: query
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
          description: Repeatable or comma-separated issuer IDs; may be combined with issuer_id
        - name: deductible_min
          in: query
          schema:
            type: number
          description: Minimum in-network individual deductible
        - name: deductible_max
          in: query
          schema:
            type: number
          description: Maximum in-network individual deductible
        - name: moop_min
          in: query
          schema:
            type: number
          description: Minimum in-network individual maximum out-of-pocket
        - name: moop_max
          in: query
          schema:
            type: number
          description: Maximum in-network individual maximum out-of-pocket
      responses:
        '200':
          description: Paginated plan search payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanSearchResponse'
        '400':
          description: Invalid numeric filters (age/year) supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /formulary/ids:
    get:
      summary: Search formularies by issuer, plan, year, or drug keyword
      parameters:
        - name: issuer_id
          in: query
          schema:
            type: integer
        - name: plan_id
          in: query
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
        - name: state
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 2
        - name: drug
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Paginated list of formularies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormularyListResponse'
  /formulary/id/{formulary_id}:
    get:
      summary: Retrieve formulary metadata and linked plan
      parameters:
        - name: formulary_id
          in: path
          required: true
          schema:
            type: string
          description: Combination of plan identifier and year (e.g. PLAN123:2025)
      responses:
        '200':
          description: Formulary detail payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormularyDetail'
        '404':
          description: Formulary not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /formulary/id/{formulary_id}/drugs:
    get:
      summary: List drugs covered by a formulary
      parameters:
        - name: formulary_id
          in: path
          required: true
          schema:
            type: string
        - name: tier
          in: query
          schema:
            type: string
        - name: pharmacy_type
          in: query
          schema:
            type: string
        - name: authorization_required
          in: query
          schema:
            type: boolean
        - name: step_therapy
          in: query
          schema:
            type: boolean
        - name: quantity_limit
          in: query
          schema:
            type: boolean
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, tier]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Paginated list of formulary drugs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormularyDrugList'
        '404':
          description: Formulary not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /formulary/id/{formulary_id}/drugs/{rxnorm_id}:
    get:
      summary: Retrieve formulary-specific drug information
      parameters:
        - name: formulary_id
          in: path
          required: true
          schema:
            type: string
        - name: rxnorm_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Drug detail within the formulary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormularyDrugDetail'
        '404':
          description: Drug not present within the formulary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /formulary/id/{formulary_id}/summary:
    get:
      summary: Retrieve aggregate metrics for a formulary
      parameters:
        - name: formulary_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Aggregate statistics for the formulary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormularySummary'
        '404':
          description: Formulary not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /formulary/plan/{plan_id}/drug/{rxnorm_id}:
    get:
      summary: Determine if a plan formulary covers a specific drug
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
        - name: rxnorm_id
          in: path
          required: true
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
          description: Optional business year; when omitted the most recent plan year is used
      responses:
        '200':
          description: Coverage status and metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanDrugCoverage'
        '404':
          description: Plan or formulary not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /formulary/drugs/{rxnorm_id}:
    get:
      summary: List every formulary covering an RxNorm identifier
      parameters:
        - name: rxnorm_id
          in: path
          required: true
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
        - name: state
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 2
        - name: issuer_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Matching formularies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormularyCrosswalk'
        '404':
          description: Drug not found in any formulary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /formulary/statistics:
    get:
      summary: Retrieve high-level formulary statistics
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: state
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 2
        - name: issuer_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Formulary analytics snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormularyStatistics'
  /formulary/partd/import/status:
    get:
      summary: Retrieve latest Part D import run status
      parameters:
        - name: run_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Part D import status payload
          content:
            application/json:
              schema:
                type: object
        '404':
          description: No run data available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /formulary/partd/snapshots:
    get:
      summary: List imported Part D monthly/quarterly snapshots
      parameters:
        - name: run_id
          in: query
          schema:
            type: string
        - name: source_type
          in: query
          schema:
            type: string
            enum: [monthly, quarterly]
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Snapshot list payload
          content:
            application/json:
              schema:
                type: object
  /formulary/partd/pharmacies/{npi}/activity:
    get:
      summary: Return Medicare activity evidence for one pharmacy NPI
      parameters:
        - name: npi
          in: path
          required: true
          schema:
            type: integer
        - name: as_of
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Pharmacy Medicare activity payload
          content:
            application/json:
              schema:
                type: object
  /formulary/partd/pharmacies/{npi}/medications/{code_system}/{code}/costs:
    get:
      summary: Return medication cost rows for one pharmacy across plans
      parameters:
        - name: npi
          in: path
          required: true
          schema:
            type: integer
        - name: code_system
          in: path
          required: true
          schema:
            type: string
            enum: [rxnorm, rxcui, ndc]
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: plan_ids
          in: query
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Pharmacy medication cost payload
          content:
            application/json:
              schema:
                type: object
  /pharmacy-license/import/status:
    get:
      summary: Retrieve latest pharmacy-license import run status
      parameters:
        - name: run_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Pharmacy-license import status payload
          content:
            application/json:
              schema:
                type: object
        '404':
          description: No pharmacy-license run data available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /pharmacy-license/coverage:
    get:
      summary: Retrieve state coverage for pharmacy-license ingestion support
      responses:
        '200':
          description: State-level pharmacy-license coverage summary
          content:
            application/json:
              schema:
                type: object
  /pharmacy-license/pharmacies/{npi}:
    get:
      summary: Retrieve pharmacy-license profile for an NPI
      parameters:
        - name: npi
          in: path
          required: true
          schema:
            type: integer
        - name: as_of
          in: query
          schema:
            type: string
            format: date
        - name: include_history
          in: query
          schema:
            type: boolean
        - name: history_limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Pharmacy-license profile payload
          content:
            application/json:
              schema:
                type: object
  /reports/pharmacies/markets:
    get:
      summary: List pharmacy market summaries from NPPES plus Part D plus state-license overlays
      parameters:
        - name: state
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 2
        - name: city
          in: query
          schema:
            type: string
        - name: county
          in: query
          schema:
            type: string
        - name: zip
          in: query
          schema:
            type: string
            pattern: '^[0-9]{5}$'
        - name: scope
          in: query
          schema:
            type: string
            enum: [state, city, county, zip]
        - name: sort
          in: query
          schema:
            type: string
            enum: [pharmacy_count, pharmacies_per_100k, access_score, active_medicare_share, license_coverage_share]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: as_of
          in: query
          schema:
            type: string
            format: date
        - name: include_staffing
          in: query
          schema:
            type: boolean
        - name: chain
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
        - name: start
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Pharmacy market summaries
          content:
            application/json:
              schema:
                type: object
  /reports/pharmacies/markets/{market_id}:
    get:
      summary: Get one pharmacy market summary by market_id
      parameters:
        - name: market_id
          in: path
          required: true
          schema:
            type: string
        - name: as_of
          in: query
          schema:
            type: string
            format: date
        - name: include_staffing
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Pharmacy market summary
          content:
            application/json:
              schema:
                type: object
  /reports/pharmacies/rankings/access:
    get:
      summary: List ranked pharmacy markets by access score
      parameters:
        - name: state
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 2
        - name: city
          in: query
          schema:
            type: string
        - name: county
          in: query
          schema:
            type: string
        - name: zip
          in: query
          schema:
            type: string
            pattern: '^[0-9]{5}$'
        - name: scope
          in: query
          schema:
            type: string
            enum: [state, city, county, zip]
        - name: as_of
          in: query
          schema:
            type: string
            format: date
        - name: include_staffing
          in: query
          schema:
            type: boolean
        - name: chain
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
        - name: start
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Ranked pharmacy market summaries
          content:
            application/json:
              schema:
                type: object
  /reports/pharmacies/{npi}/market-context:
    get:
      summary: Return market context summary for one pharmacy NPI
      parameters:
        - name: npi
          in: path
          required: true
          schema:
            type: integer
        - name: as_of
          in: query
          schema:
            type: string
            format: date
        - name: include_staffing
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Pharmacy market context payload
          content:
            application/json:
              schema:
                type: object
  /plan/price/{plan_id}:
    get:
      summary: Retrieve price rows for a plan
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
        - name: age
          in: query
          schema:
            type: integer
          description: Optional age filter; validated but not applied server-side
        - name: year
          in: query
          schema:
            type: integer
          description: Optional business year filter
        - name: rating_area
          in: query
          schema:
            type: string
          description: Optional rating area filter; validated but not applied server-side
      responses:
        '200':
          description: Array of price entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanPriceEntry'
        '400':
          description: Invalid age supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /plan/price/{plan_id}/year:
    get:
      summary: Retrieve price rows for a plan and year
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
        - name: age
          in: query
          schema:
            type: integer
          description: Optional age filter; validated but not applied server-side
        - name: year
          in: query
          schema:
            type: integer
          description: Optional business year filter
        - name: rating_area
          in: query
          schema:
            type: string
      responses:
