version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python-runtime:
        patterns:
          - "*"
    ignore:
      - dependency-name: "redis"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "cargo"
    directory: "/support/ptg2_scanner"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      rust-scanner:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
