name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.14"
  CARGO_TERM_COLOR: always

jobs:
  public-hygiene:
    name: public hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Commit message policy
        run: python3 scripts/check_commit_messages.py --event "$GITHUB_EVENT_PATH"
      - name: Check public repository hygiene
        run: python scripts/ci/public_hygiene.py

  python-quality:
    name: python quality and focused tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Commit message policy
        run: python3 scripts/check_commit_messages.py --event "$GITHUB_EVENT_PATH"
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Compile service modules
        run: python -m compileall api process db scripts main.py
      - name: Provider Directory runtime contract
        run: python scripts/smoke/provider_directory_runtime_contract.py
      - name: Check Provider Directory support documentation
        run: python scripts/generate_provider_directory_support_docs.py --check
      - name: Readability budget
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -n "$BASE_SHA" ]; then
            git show "$BASE_SHA:readability-baseline.json" > "$RUNNER_TEMP/readability-base.json"
            python scripts/readability_budget.py \
              --ratchet-baseline "$RUNNER_TEMP/readability-base.json" \
              --required-reduction-percent 1
          else
            python scripts/readability_budget.py
          fi
      - name: Guard request-time external calls
        run: python scripts/ci/request_time_external_call_guard.py
      - name: Run control-plane unit tests
        run: >
          python -m pytest -q
          tests/test_commit_message_policy.py
          tests/test_control_cancel.py
          tests/test_control_failure_metrics.py
          tests/test_control_imports_api.py
          tests/test_control_workers.py
          tests/test_archive_unit.py
          tests/test_process_provider_directory_fhir_unit.py
          tests/test_provider_directory_fhir_bulk_security.py
          tests/test_provider_directory_endpoint_acquisition_harness.py
          tests/test_provider_directory_endpoint_acquisition_harness_adoption.py
          tests/test_provider_directory_endpoint_acquisition_harness_restart.py
          tests/test_provider_directory_coverage_audit.py
          tests/test_provider_directory_artifact_cutover.py
          tests/test_provider_directory_artifact_cutover_reconciliation.py
          tests/test_entity_address_unified_provider_directory.py
          tests/test_provider_directory_endpoint_dataset_schema.py
          tests/test_provider_directory_pagination_checkpoint_schema.py
          tests/test_provider_directory_pagination_root_identity_schema.py
          tests/test_provider_directory_schema_sync.py
          tests/test_provider_directory_bulk_checkpoint_schema.py
          tests/test_generate_provider_directory_support_docs.py
          tests/test_provider_directory_catalog_confirmation.py
          tests/test_update_provider_directory_verification.py
          tests/test_address_canonical_unit.py
          tests/test_address_checksum_schema.py
          tests/test_mrf_source_discovery.py
          tests/test_process_mrf_unit.py
          tests/test_process_npi_import.py
          tests/test_npi_api.py
          tests/test_npi_provider_directory_evidence.py
          tests/test_process_ms_drg_unit.py
          tests/test_process_pharmacy_license_unit.py
          tests/test_pharmacy_license_run_failure_unit.py
          tests/test_process_ptg_unit.py
          tests/test_ptg_publish_state_races.py
          tests/test_ptg2_artifact_blobs.py
          tests/test_ptg2_db_sidecars.py
          tests/test_ptg2_db_serving_binary.py
          tests/test_ptg2_db_serving_v3.py
          tests/test_ptg2_manifest_artifacts.py
          tests/test_ptg2_manifest_cleanup.py
          tests/test_ptg2_postgres_binary_v3_api.py
          tests/test_ptg2_scanner_indexed_rapidgzip.py
          tests/test_ptg2_scanner_parallelism.py
          tests/test_ptg2_serving.py
          tests/test_ptg2_serving_binary_v3.py
          tests/test_ptg2_serving_binary_v3_publish.py
          tests/test_ptg2_serving_binary_v3_writer.py
          tests/test_ptg2_serving_binary_writer.py
          tests/test_ptg2_source_snapshot_gc.py
          tests/test_ptg_control_unit.py
          tests/test_ptg_snapshot_claim_race.py
          tests/test_ptg_snapshot_cleanup_race.py
          tests/test_ptg_snapshot_cleanup_safety.py
          tests/test_ptg_source_snapshot_control.py
          tests/test_ptg_source_snapshot_control_race.py
          tests/test_ptg_source_snapshot_control_safety.py

  api-contract:
    name: openapi contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run OpenAPI route/spec checks
        run: python -m pytest -q tests/test_openapi_spec.py tests/test_api_init_and_utils.py tests/test_healthcheck.py

  rust-scanner:
    name: rust scanner
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: support/ptg2_scanner
      - name: Install Python build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Format check
        run: cargo fmt --manifest-path support/ptg2_scanner/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path support/ptg2_scanner/Cargo.toml --all-targets -- -D warnings
      - name: Scanner tests
        run: cargo test --manifest-path support/ptg2_scanner/Cargo.toml
      - name: Cargo audit
        run: |
          cargo install cargo-audit --locked
          cd support/ptg2_scanner
          cargo audit
      - name: Build release scanner
        run: cargo build --release --manifest-path support/ptg2_scanner/Cargo.toml
      - name: Build and test PyO3 address canon wheel
        run: |
          cd support/ptg2_scanner
          python -m maturin build --release --features python-extension --out target/wheels
          python -m pip install target/wheels/*.whl
          cd ../..
          python -m pytest -q tests/test_address_canon_pyo3.py
      - name: Smoke address canonical COPY CLI
        run: |
          tmp=$(mktemp -d)
          support/ptg2_scanner/target/release/ptg2_scanner --canon-version | python -c 'import json,sys; payload=json.load(sys.stdin); assert payload["ruleset_version"] == 3, payload'
          printf "1\t(0,1)\t\\N\t123 Main St\tSuite 2\tAustin\tTX\t78701\tUS\n" > "$tmp/raw.copy"
          support/ptg2_scanner/target/release/ptg2_scanner \
            --address-canonicalize-copy "$tmp/raw.copy" "$tmp/keyed.copy"
          test -s "$tmp/keyed.copy"

  security:
    name: dependency and semgrep security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Python dependency audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          pip-audit -r requirements.txt
          pip-audit -r requirements-dev.txt
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: .semgrep.yml

  worker-queue-smoke:
    name: redis worker queue smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      HLTHPRT_REDIS_ADDRESS: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Verify Redis queue depth path
        run: |
          python - <<'PY'
          import asyncio
          from redis.asyncio import Redis

          async def main():
              redis = Redis(host="127.0.0.1", port=6379, decode_responses=True)
              await redis.rpush("arq:ci-smoke", "healthporta-ci")
              assert await redis.llen("arq:ci-smoke") == 1
              await redis.delete("arq:ci-smoke")
              await redis.aclose()

          asyncio.run(main())
          PY
      - name: Run worker control tests
        run: python -m pytest -q tests/test_control_workers.py tests/test_control_imports_api.py tests/test_control_cancel.py

  address-canonical-db-tests:
    name: postgres18 postgis address canonical tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: healthporta_address_canon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d healthporta_address_canon_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      HLTHPRT_DB_DRIVER: asyncpg
      HLTHPRT_DB_HOST: 127.0.0.1
      HLTHPRT_DB_PORT: "5432"
      HLTHPRT_DB_USER: postgres
      HLTHPRT_DB_PASSWORD: postgres
      HLTHPRT_DB_DATABASE: healthporta_address_canon_test
      HLTHPRT_DB_SCHEMA: mrf
      DB_SCHEMA: mrf
      HLTHPRT_REDIS_ADDRESS: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Prepare PostGIS and address canonical schema
        run: |
          python - <<'PY'
          import asyncio
          import asyncpg
          import os

          async def main():
              conn = await asyncpg.connect(
                  host=os.environ["HLTHPRT_DB_HOST"],
                  port=int(os.environ["HLTHPRT_DB_PORT"]),
                  user=os.environ["HLTHPRT_DB_USER"],
                  password=os.environ["HLTHPRT_DB_PASSWORD"],
                  database=os.environ["HLTHPRT_DB_DATABASE"],
              )
              await conn.execute("CREATE EXTENSION IF NOT EXISTS postgis")
              await conn.execute('CREATE SCHEMA IF NOT EXISTS "mrf"')
              await conn.close()

          asyncio.run(main())
          PY
          alembic stamp 20260610143000_address_checksums_bigint
          alembic upgrade head
      - name: Build Rust scanner for parity tests
        run: cargo build --manifest-path support/ptg2_scanner/Cargo.toml
      - name: Run address canonical DB tests
        run: python -m pytest -q tests/test_address_canonical_db.py
