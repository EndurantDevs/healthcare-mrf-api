name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.14"
  CARGO_TERM_COLOR: always

jobs:
  public-hygiene:
    name: public hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Commit message policy
        run: python3 scripts/check_commit_messages.py --event "$GITHUB_EVENT_PATH"
      - name: Test public repository hygiene gate
        run: python3 tests/test_public_hygiene.py
      - name: Check public repository hygiene
        run: python3 scripts/ci/public_hygiene.py

  python-quality:
    name: python quality and focused tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Commit message policy
        run: python3 scripts/check_commit_messages.py --event "$GITHUB_EVENT_PATH"
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Compile service modules
        run: python -m compileall api process db scripts main.py
      - name: Provider Directory runtime contract
        run: python scripts/smoke/provider_directory_runtime_contract.py
      - name: Check Provider Directory support documentation
        run: python scripts/generate_provider_directory_support_docs.py --check
      - name: Check readability CI policy
        run: bash tests/test_ci_readability_policy.sh
      - name: Readability budget
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -n "$BASE_SHA" ]; then
            git show "$BASE_SHA:readability-baseline.json" > "$RUNNER_TEMP/readability-base.json"
            if git diff --quiet "$BASE_SHA" HEAD -- \
              main.py \
              ':(glob)api/**/*.py' \
              ':(glob)db/**/*.py' \
              ':(glob)process/**/*.py' \
              ':(glob)service/**/*.py'; then
              python scripts/readability_budget.py \
                --ratchet-baseline "$RUNNER_TEMP/readability-base.json" \
                --required-reduction-percent 0
            else
              python scripts/readability_budget.py \
                --ratchet-baseline "$RUNNER_TEMP/readability-base.json" \
                --required-reduction-percent 1
            fi
          else
            python scripts/readability_budget.py
          fi
      - name: Guard request-time external calls
        run: python scripts/ci/request_time_external_call_guard.py
      - name: Run control-plane unit tests
        run: >
          python -m pytest -q
          tests/test_commit_message_policy.py
          tests/test_readability_budget.py
          tests/test_readability_function_names.py
          tests/test_control_cancel.py
          tests/test_control_failure_metrics.py
          tests/test_control_imports_api.py
          tests/test_control_workers.py
          tests/test_mrf_discovery_catalog_api.py
          tests/test_mrf_discovery_checkpoint_integration.py
          tests/test_mrf_discovery_process_pool.py
          tests/test_mrf_discovery_source_checkpoint_schema.py
          tests/test_mrf_discovery_source_checkpoints.py
          tests/test_mrf_discovery_worker_targeting.py
          tests/test_archive_unit.py
          tests/test_process_provider_directory_fhir_unit.py
          tests/test_provider_directory_dataset_network_plan.py
          tests/test_provider_directory_dataset_network_plan_schema.py
          tests/test_provider_directory_dataset_serving_relations_races.py
          tests/test_provider_directory_time_partition.py
          tests/test_provider_directory_fhir_bulk_security.py
          tests/test_provider_directory_fhir_completeness.py
