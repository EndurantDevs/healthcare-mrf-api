          tests/test_ptg_source_snapshot_removal_v3.py

  test-coverage:
    name: test coverage ratchet
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run tests with coverage
        run: |
          python -m coverage run --rcfile=test-coverage.ini \
            -m pytest -q \
            --deselect tests/test_mrf_source_discovery.py::test_mymedicalshopper_ddp_call_uses_overall_deadline_for_heartbeats
          python -m coverage json --rcfile=test-coverage.ini -o test-coverage-python.json
      - name: Test coverage ratchet
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          python scripts/coverage_ratchet.py --self-test
          reference_args=()
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi
          if [ -n "$BASE_SHA" ] && git cat-file -e "$BASE_SHA:test-coverage-baseline.json" 2>/dev/null; then
            git show "$BASE_SHA:test-coverage-baseline.json" > "$RUNNER_TEMP/test-coverage-base.json"
            reference_args+=(--reference-baseline "$RUNNER_TEMP/test-coverage-base.json")
          fi
          python scripts/coverage_ratchet.py --report python "${reference_args[@]}"

  capacity-evidence:
    name: ptg2 capacity evidence
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run capacity evidence tests
        run: >
          python -m pytest -q --durations=20
          tests/test_ptg2_capacity_evidence.py
          tests/test_ptg2_v3_bounded_readers.py
          tests/test_ptg2_v3_capacity_gate.py
          tests/test_ptg2_v3_capacity_gate_adversarial.py
          tests/test_ptg2_v3_capacity_resources.py

  api-contract:
    name: openapi contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run OpenAPI route/spec checks
        run: python -m pytest -q tests/test_openapi_spec.py tests/test_api_init_and_utils.py tests/test_healthcheck.py

  rust-scanner:
    name: rust scanner
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy, llvm-tools-preview
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: support/ptg2_scanner
      - name: Install Python build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Format check
        run: cargo fmt --manifest-path support/ptg2_scanner/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path support/ptg2_scanner/Cargo.toml --all-targets -- -D warnings
      - name: Scanner tests
        run: |
          cargo install cargo-llvm-cov --version 0.8.7 --locked
          cargo llvm-cov --manifest-path support/ptg2_scanner/Cargo.toml \
            --all-targets --features python --json --summary-only \
            --output-path test-coverage-rust.json
      - name: Rust coverage ratchet
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          python scripts/coverage_ratchet.py --self-test
          reference_args=()
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi
          if [ -n "$BASE_SHA" ] && git cat-file -e "$BASE_SHA:test-coverage-baseline.json" 2>/dev/null; then
            git show "$BASE_SHA:test-coverage-baseline.json" > "$RUNNER_TEMP/test-coverage-base.json"
            reference_args+=(--reference-baseline "$RUNNER_TEMP/test-coverage-base.json")
          fi
          python scripts/coverage_ratchet.py --report rust "${reference_args[@]}"
      - name: Cargo audit
        run: |
          cargo install cargo-audit --locked
          cd support/ptg2_scanner
          cargo audit
      - name: Build release scanner
        run: cargo build --release --manifest-path support/ptg2_scanner/Cargo.toml
      - name: Build and test PyO3 address canon wheel
        run: |
          cd support/ptg2_scanner
          python -m maturin build --release --features python-extension --out target/wheels
          python -m pip install target/wheels/*.whl
          cd ../..
          python -m pytest -q tests/test_address_canon_pyo3.py
      - name: Smoke address canonical COPY CLI
        run: |
          tmp=$(mktemp -d)
          support/ptg2_scanner/target/release/ptg2_scanner --canon-version | python -c 'import json,sys; payload=json.load(sys.stdin); assert payload["ruleset_version"] == 4, payload'
          printf "1\t(0,1)\t\\N\t123 Main St\tSuite 2\tAustin\tTX\t78701\tUS\n" > "$tmp/raw.copy"
          support/ptg2_scanner/target/release/ptg2_scanner \
            --address-canonicalize-copy "$tmp/raw.copy" "$tmp/keyed.copy"
          test -s "$tmp/keyed.copy"

  security:
    name: dependency and semgrep security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Python dependency audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          pip-audit -r requirements.txt
          pip-audit -r requirements-dev.txt
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: .semgrep.yml

  worker-queue-smoke:
    name: redis worker queue smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      HLTHPRT_REDIS_ADDRESS: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Verify Redis queue depth path
        run: |
          python - <<'PY'
          import asyncio
          from redis.asyncio import Redis

          async def main():
              redis = Redis(host="127.0.0.1", port=6379, decode_responses=True)
              await redis.rpush("arq:ci-smoke", "healthporta-ci")
              assert await redis.llen("arq:ci-smoke") == 1
              await redis.delete("arq:ci-smoke")
              await redis.aclose()

          asyncio.run(main())
          PY
      - name: Run worker control tests
        run: python -m pytest -q tests/test_control_workers.py tests/test_control_imports_api.py tests/test_control_cancel.py

  address-canonical-db-tests:
    name: postgres18 postgis address canonical tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ptg2_v3_lifecycle_test_ci_runner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ptg2_v3_lifecycle_test_ci_runner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      HLTHPRT_DB_DRIVER: asyncpg
      HLTHPRT_DB_HOST: 127.0.0.1
      HLTHPRT_DB_PORT: "5432"
      HLTHPRT_DB_USER: postgres
      HLTHPRT_DB_PASSWORD: postgres
      HLTHPRT_DB_DATABASE: ptg2_v3_lifecycle_test_ci_runner
      HLTHPRT_DB_SCHEMA: mrf
      DB_SCHEMA: mrf
      HLTHPRT_REDIS_ADDRESS: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Prepare PostGIS and address canonical schema
        run: |
          python - <<'PY'
          import asyncio
          import asyncpg
          import os

          async def main():
              conn = await asyncpg.connect(
                  host=os.environ["HLTHPRT_DB_HOST"],
                  port=int(os.environ["HLTHPRT_DB_PORT"]),
                  user=os.environ["HLTHPRT_DB_USER"],
                  password=os.environ["HLTHPRT_DB_PASSWORD"],
                  database=os.environ["HLTHPRT_DB_DATABASE"],
              )
              await conn.execute("CREATE EXTENSION IF NOT EXISTS postgis")
              await conn.execute('CREATE SCHEMA IF NOT EXISTS "mrf"')
              await conn.close()

          asyncio.run(main())
          PY
          alembic stamp 20260610143000_address_checksums_bigint
          alembic upgrade head
      - name: Run Provider Directory migration adoption and repair cycle
        env:
          HLTHPRT_PROVIDER_DIRECTORY_MIGRATION_POSTGRES_DSN: "postgresql://${{ env.HLTHPRT_DB_USER }}:${{ env.HLTHPRT_DB_PASSWORD }}@${{ env.HLTHPRT_DB_HOST }}:${{ env.HLTHPRT_DB_PORT }}/${{ env.HLTHPRT_DB_DATABASE }}"
          HLTHPRT_MRF_FILE_CURSOR_MIGRATION_POSTGRES_DSN: "postgresql://${{ env.HLTHPRT_DB_USER }}:${{ env.HLTHPRT_DB_PASSWORD }}@${{ env.HLTHPRT_DB_HOST }}:${{ env.HLTHPRT_DB_PORT }}/${{ env.HLTHPRT_DB_DATABASE }}"
        run: >
          python -m pytest -q
          tests/test_provider_directory_migration_adoption_postgres.py
          tests/test_provider_directory_caresource_census_db.py
          tests/test_mrf_file_source_cursor_migration.py
      - name: Run fresh-migrated PTG2 v3 PostgreSQL lifecycle gate
        env:
          HLTHPRT_PTG2_V3_LIFECYCLE_POSTGRES_DSN: "postgresql://${{ env.HLTHPRT_DB_USER }}:${{ env.HLTHPRT_DB_PASSWORD }}@${{ env.HLTHPRT_DB_HOST }}:${{ env.HLTHPRT_DB_PORT }}/${{ env.HLTHPRT_DB_DATABASE }}"
        run: python -m pytest -q tests/test_ptg2_v3_migrated_lifecycle_postgres.py
      - name: Run candidate attestation rolling-compatibility gate
        env:
          HLTHPRT_PTG2_ATTESTATION_COMPAT_POSTGRES_TEST: "1"
        run: python -m pytest -q tests/test_ptg2_attestation_contract_compat_postgres.py
      - name: Run MRF discovery checkpoint PostgreSQL gate
        env:
          HLTHPRT_MRF_DISCOVERY_CHECKPOINT_POSTGRES_DSN: "postgresql://${{ env.HLTHPRT_DB_USER }}:${{ env.HLTHPRT_DB_PASSWORD }}@${{ env.HLTHPRT_DB_HOST }}:${{ env.HLTHPRT_DB_PORT }}/${{ env.HLTHPRT_DB_DATABASE }}"
        run: python -m pytest -q tests/test_mrf_discovery_checkpoints_postgres.py
      - name: Build Rust scanner for parity tests
        run: cargo build --manifest-path support/ptg2_scanner/Cargo.toml
      - name: Run strict shared PTG PostgreSQL publish, graph, and cold-read smoke
        env:
          HLTHPRT_PTG2_SHARED_PUBLISH_POSTGRES_TEST: "1"
        run: >
          python -m pytest -q
          tests/test_ptg2_shared_graph_postgres.py
          tests/test_ptg2_shared_price_postgres.py
          tests/test_ptg2_shared_snapshot_publish_postgres.py
      - name: Run strict shared PTG PostgreSQL GC and removal tests
        env:
          HLTHPRT_PTG2_SHARED_GC_POSTGRES_TEST: "1"
        run: >
          python -m pytest -q
          tests/test_ptg2_shared_gc.py
          tests/test_ptg_source_snapshot_removal_v3.py
      - name: Run strict shared PTG PostgreSQL cross-plan reuse tests
        env:
          HLTHPRT_PTG2_CROSS_PLAN_POSTGRES_TEST: "1"
        run: python -m pytest -q tests/test_ptg2_v3_cross_plan_reuse.py
      - name: Run address canonical DB tests
        run: |
          python -m pytest -q tests/test_address_canonical_db.py
          python -m pytest -q tests/test_npi_geo_evidence_search_db.py
          python -m pytest -q tests/test_entity_address_unified_archive_coordinates_db.py
          python -m pytest -q tests/test_npi_phone_evidence_search_db.py
          python -m pytest -q tests/test_npi_provider_directory_role_evidence_db.py
          python -m pytest -q tests/test_provider_directory_profile_affiliations_db.py
          python -m pytest -q tests/test_provider_directory_dataset_serving_relations_db.py
          python -m pytest -q tests/test_provider_directory_contra_affiliation.py
          python -m pytest -q tests/test_provider_directory_dataset_artifact_db.py
          python -m pytest -q tests/test_provider_directory_artifact_scope_bulk_load_db.py
          python -m pytest -q tests/test_provider_directory_dataset_rehydrate_db.py
          python -m pytest -q tests/test_provider_directory_two_phase_publication.py
          python -m pytest -q tests/test_provider_directory_contract_identity_cutover.py
          python -m pytest -q tests/test_provider_directory_retry_cleanup.py
          python -m pytest -q tests/test_provider_directory_artifact_cutover_reconciliation.py
