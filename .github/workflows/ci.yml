name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docker-image-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Build Python 3.14 image
        run: docker build --pull --tag healthcare-mrf-api:ci .
      - name: Smoke Rust scanner in image
        run: |
          docker run --rm healthcare-mrf-api:ci test -x /opt/support/ptg2_scanner/target/release/ptg2_scanner
          docker run --rm healthcare-mrf-api:ci sh -ec '
            tmp=$(mktemp -d)
            printf "1\t\\N\t123 Main St\tSuite 2\tAustin\tTX\t78701\tUS\n" > "$tmp/raw.copy"
            /opt/support/ptg2_scanner/target/release/ptg2_scanner \
              --address-canonicalize-copy "$tmp/raw.copy" "$tmp/keyed.copy"
            test -s "$tmp/keyed.copy"
          '

  ptg2-scanner-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run scanner tests
        run: cargo test --manifest-path support/ptg2_scanner/Cargo.toml
      - name: Build release scanner
        run: cargo build --release --manifest-path support/ptg2_scanner/Cargo.toml
      - name: Smoke address canonical COPY CLI
        run: |
          tmp=$(mktemp -d)
          printf "1\t\\N\t123 Main St\tSuite 2\tAustin\tTX\t78701\tUS\n" > "$tmp/raw.copy"
          support/ptg2_scanner/target/release/ptg2_scanner \
            --address-canonicalize-copy "$tmp/raw.copy" "$tmp/keyed.copy"
          test -s "$tmp/keyed.copy"

  control-plane-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Compile control-plane modules
        run: python -m compileall api process db
      - name: Run control-plane unit tests
        run: >
          python -m pytest -q
          tests/test_control_cancel.py
          tests/test_control_imports_api.py
          tests/test_control_workers.py
          tests/test_archive_unit.py
          tests/test_address_canonical_unit.py
          tests/test_address_checksum_schema.py
          tests/test_mrf_source_discovery.py
          tests/test_process_mrf_unit.py
          tests/test_process_npi_import.py
          tests/test_process_ms_drg_unit.py
          tests/test_process_pharmacy_license_unit.py
          tests/test_pharmacy_license_run_failure_unit.py
          tests/test_process_ptg_unit.py
          tests/test_ptg_control_unit.py

  address-canonical-db-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: healthporta_address_canon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d healthporta_address_canon_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      HLTHPRT_DB_DRIVER: asyncpg
      HLTHPRT_DB_HOST: 127.0.0.1
      HLTHPRT_DB_PORT: "5432"
      HLTHPRT_DB_USER: postgres
      HLTHPRT_DB_PASSWORD: postgres
      HLTHPRT_DB_DATABASE: healthporta_address_canon_test
      HLTHPRT_DB_SCHEMA: mrf
      DB_SCHEMA: mrf
      # No redis service: the DB suite runs without a control run_id, so the
      # live-progress path returns before touching Redis (process/live_progress.py).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Prepare address canonical schema
        run: |
          alembic stamp 20260610143000_address_checksums_bigint
          alembic upgrade head
      - name: Build Rust scanner for parity tests
        run: cargo build --manifest-path support/ptg2_scanner/Cargo.toml
      - name: Run address canonical DB tests
        run: python -m pytest -q tests/test_address_canonical_db.py
