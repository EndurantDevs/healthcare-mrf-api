name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.14"
  CARGO_TERM_COLOR: always
  CAPACITY_TEST_PATHS: |-
    tests/test_ptg2_capacity_evidence.py
    tests/test_ptg2_v3_bounded_readers.py
    tests/test_ptg2_v3_capacity_gate.py
    tests/test_ptg2_v3_capacity_gate_adversarial.py
    tests/test_ptg2_v3_capacity_resources.py

jobs:
  public-hygiene:
    name: public hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Commit message policy
        run: python3 scripts/check_commit_messages.py --event "$GITHUB_EVENT_PATH"
      - name: Test public repository hygiene gate
        run: python3 tests/test_public_hygiene.py
      - name: Check public repository hygiene
        run: python3 scripts/ci/public_hygiene.py

  python-quality:
    name: python quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Commit message policy
        run: python3 scripts/check_commit_messages.py --event "$GITHUB_EVENT_PATH"
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Compile service modules
        run: python -m compileall api process db scripts main.py
      - name: Provider Directory runtime contract
        run: python scripts/smoke/provider_directory_runtime_contract.py
      - name: Check Provider Directory support documentation
        run: python scripts/generate_provider_directory_support_docs.py --check
      - name: Check readability CI policy
        run: bash tests/test_ci_readability_policy.sh
      - name: Readability budget
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          READABILITY_ZERO_GROWTH_APPROVED: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'readability-zero-growth-approved') }}
        run: |
          if [ -n "$BASE_SHA" ]; then
            git show "$BASE_SHA:readability-baseline.json" > "$RUNNER_TEMP/readability-base.json"
            required_reduction_percent=1
            if git diff --quiet "$BASE_SHA" HEAD -- \
              main.py \
              ':(glob)api/**/*.py' \
              ':(glob)db/**/*.py' \
              ':(glob)process/**/*.py' \
              ':(glob)service/**/*.py'; then
              required_reduction_percent=0
            elif [ "$READABILITY_ZERO_GROWTH_APPROVED" = "true" ]; then
              required_reduction_percent=0
            fi
            python scripts/readability_budget.py \
              --ratchet-baseline "$RUNNER_TEMP/readability-base.json" \
              --required-reduction-percent "$required_reduction_percent"
          else
            python scripts/readability_budget.py
          fi
      - name: Guard request-time external calls
        run: python scripts/ci/request_time_external_call_guard.py

  python-tests:
    name: python test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COVERAGE_FILE: .coverage.main
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run non-capacity tests with coverage
        run: |
          mapfile -t capacity_tests <<< "$CAPACITY_TEST_PATHS"
          ignore_args=()
          for test_path in "${capacity_tests[@]}"; do
            ignore_args+=(--ignore "$test_path")
          done
          python -m pytest -q -n 2 --dist loadscope --durations=20 \
            --cov-config=test-coverage.ini \
            --cov=api --cov=db --cov=process --cov=service --cov=main \
            --cov-branch --cov-report= \
            "${ignore_args[@]}"
      - name: Upload main-suite coverage data
        uses: actions/upload-artifact@v7
        with:
          name: mrf-python-coverage-main
          path: .coverage.main
          include-hidden-files: true
          retention-days: 1

  capacity-evidence:
    name: ptg2 capacity evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      COVERAGE_FILE: .coverage.capacity
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run capacity evidence tests with coverage
        run: |
          mapfile -t capacity_tests <<< "$CAPACITY_TEST_PATHS"
          python -m pytest -q -n 4 --dist load --durations=20 \
            --cov-config=test-coverage.ini \
            --cov=api --cov=db --cov=process --cov=service --cov=main \
            --cov-branch --cov-report= \
            "${capacity_tests[@]}"
      - name: Upload capacity coverage data
        uses: actions/upload-artifact@v7
        with:
          name: mrf-python-coverage-capacity
          path: .coverage.capacity
          include-hidden-files: true
          retention-days: 1

  test-coverage:
    name: test coverage ratchet
    needs:
      - python-tests
      - capacity-evidence
      - address-canonical-db-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install coverage tooling
        run: python -m pip install coverage==7.15.2
      - name: Download main-suite coverage data
        uses: actions/download-artifact@v8
        with:
          name: mrf-python-coverage-main
          path: coverage-data/main
      - name: Download capacity coverage data
        uses: actions/download-artifact@v8
        with:
          name: mrf-python-coverage-capacity
          path: coverage-data/capacity
      - name: Download PostgreSQL coverage data
        uses: actions/download-artifact@v8
        with:
          name: mrf-python-coverage-postgres
          path: coverage-data/postgres
      - name: Combine coverage data
        run: |
          python -m coverage combine \
            coverage-data/main \
            coverage-data/capacity \
            coverage-data/postgres
          python -m coverage json --rcfile=test-coverage.ini -o test-coverage-python.json
      - name: Test coverage ratchet
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          python scripts/coverage_ratchet.py --self-test
          reference_args=()
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi
          if [ -n "$BASE_SHA" ] && git cat-file -e "$BASE_SHA:test-coverage-baseline.json" 2>/dev/null; then
            git show "$BASE_SHA:test-coverage-baseline.json" > "$RUNNER_TEMP/test-coverage-base.json"
            reference_args+=(
              --reference-baseline "$RUNNER_TEMP/test-coverage-base.json"
              --changed-since "$BASE_SHA"
            )
          fi
          python scripts/coverage_ratchet.py --report python "${reference_args[@]}"

  api-contract:
    name: openapi contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run OpenAPI route/spec checks
        run: python -m pytest -q tests/test_openapi_spec.py tests/test_api_init_and_utils.py tests/test_healthcheck.py

  rust-scanner:
    name: rust scanner
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy, llvm-tools-preview
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: support/ptg2_scanner
      - name: Install Python build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Format check
        run: cargo fmt --manifest-path support/ptg2_scanner/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path support/ptg2_scanner/Cargo.toml --all-targets -- -D warnings
      - name: Scanner tests
        run: |
          cargo install cargo-llvm-cov --version 0.8.7 --locked
          cargo llvm-cov --manifest-path support/ptg2_scanner/Cargo.toml \
            --all-targets --features python --json --summary-only \
            --output-path test-coverage-rust.json
      - name: Rust coverage ratchet
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          python scripts/coverage_ratchet.py --self-test
          reference_args=()
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi
          if [ -n "$BASE_SHA" ] && git cat-file -e "$BASE_SHA:test-coverage-baseline.json" 2>/dev/null; then
            git show "$BASE_SHA:test-coverage-baseline.json" > "$RUNNER_TEMP/test-coverage-base.json"
            reference_args+=(
              --reference-baseline "$RUNNER_TEMP/test-coverage-base.json"
              --changed-since "$BASE_SHA"
            )
          fi
          python scripts/coverage_ratchet.py --report rust "${reference_args[@]}"
      - name: Cargo audit
        run: |
          cargo install cargo-audit --locked
          cd support/ptg2_scanner
          cargo audit
      - name: Build release scanner
        run: cargo build --release --manifest-path support/ptg2_scanner/Cargo.toml
      - name: Build and test PyO3 address canon wheel
        run: |
          cd support/ptg2_scanner
          python -m maturin build --release --features python-extension --out target/wheels
          python -m pip install target/wheels/*.whl
          cd ../..
          python -m pytest -q tests/test_address_canon_pyo3.py
      - name: Smoke address canonical COPY CLI
        run: |
          tmp=$(mktemp -d)
          support/ptg2_scanner/target/release/ptg2_scanner --canon-version | python -c 'import json,sys; payload=json.load(sys.stdin); assert payload["ruleset_version"] == 4, payload'
          printf "1\t(0,1)\t\\N\t123 Main St\tSuite 2\tAustin\tTX\t78701\tUS\n" > "$tmp/raw.copy"
          support/ptg2_scanner/target/release/ptg2_scanner \
            --address-canonicalize-copy "$tmp/raw.copy" "$tmp/keyed.copy"
          test -s "$tmp/keyed.copy"

  security:
    name: dependency and semgrep security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Python dependency audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          pip-audit -r requirements.txt
          pip-audit -r requirements-dev.txt
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: .semgrep.yml

  worker-queue-smoke:
    name: redis worker queue smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      HLTHPRT_REDIS_ADDRESS: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Verify Redis queue depth path
        run: |
          python - <<'PY'
          import asyncio
          from redis.asyncio import Redis

          async def main():
              redis = Redis(host="127.0.0.1", port=6379, decode_responses=True)
              await redis.rpush("arq:ci-smoke", "healthporta-ci")
              assert await redis.llen("arq:ci-smoke") == 1
              await redis.delete("arq:ci-smoke")
              await redis.aclose()

          asyncio.run(main())
          PY
      - name: Run worker control tests
        run: python -m pytest -q tests/test_control_workers.py tests/test_control_imports_api.py tests/test_control_cancel.py

  address-canonical-db-tests:
    name: postgres18 postgis address canonical tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ptg2_v3_lifecycle_test_ci_runner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ptg2_v3_lifecycle_test_ci_runner"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 25
    env:
      COVERAGE_FILE: .coverage.postgres
      PYTEST_ADDOPTS: >-
        --cov-config=test-coverage.ini
        --cov=api --cov=db --cov=process --cov=service --cov=main
        --cov-branch --cov-report= --cov-append
      HLTHPRT_DB_DRIVER: asyncpg
      HLTHPRT_DB_HOST: 127.0.0.1
      HLTHPRT_DB_PORT: "5432"
      HLTHPRT_DB_USER: postgres
      HLTHPRT_DB_PASSWORD: postgres
      HLTHPRT_DB_DATABASE: ptg2_v3_lifecycle_test_ci_runner
      HLTHPRT_DB_SCHEMA: mrf
      DB_SCHEMA: mrf
      HLTHPRT_REDIS_ADDRESS: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies and build Rust scanner
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt &
          pip_pid=$!
          cargo build --manifest-path support/ptg2_scanner/Cargo.toml &
          cargo_pid=$!
          wait "$pip_pid"
          wait "$cargo_pid"
      - name: Prepare PostGIS and address canonical schema
        run: |
          python - <<'PY'
          import asyncio
          import asyncpg
          import os

          async def main():
              conn = await asyncpg.connect(
                  host=os.environ["HLTHPRT_DB_HOST"],
                  port=int(os.environ["HLTHPRT_DB_PORT"]),
                  user=os.environ["HLTHPRT_DB_USER"],
                  password=os.environ["HLTHPRT_DB_PASSWORD"],
                  database=os.environ["HLTHPRT_DB_DATABASE"],
              )
              await conn.execute("CREATE EXTENSION IF NOT EXISTS postgis")
              await conn.execute('CREATE SCHEMA IF NOT EXISTS "mrf"')
              await conn.close()

          asyncio.run(main())
          PY
          alembic stamp 20260610143000_address_checksums_bigint
          alembic upgrade head
      - name: Run Provider Directory migration adoption and repair cycle
        env:
          HLTHPRT_PROVIDER_DIRECTORY_MIGRATION_POSTGRES_DSN: "postgresql://${{ env.HLTHPRT_DB_USER }}:${{ env.HLTHPRT_DB_PASSWORD }}@${{ env.HLTHPRT_DB_HOST }}:${{ env.HLTHPRT_DB_PORT }}/${{ env.HLTHPRT_DB_DATABASE }}"
          HLTHPRT_MRF_FILE_CURSOR_MIGRATION_POSTGRES_DSN: "postgresql://${{ env.HLTHPRT_DB_USER }}:${{ env.HLTHPRT_DB_PASSWORD }}@${{ env.HLTHPRT_DB_HOST }}:${{ env.HLTHPRT_DB_PORT }}/${{ env.HLTHPRT_DB_DATABASE }}"
        run: >
          python -m pytest -q
          tests/test_provider_directory_migration_adoption_postgres.py
          tests/test_provider_directory_caresource_census_db.py
          tests/test_mrf_file_source_cursor_migration.py
      - name: Run fresh-migrated PTG2 v3 PostgreSQL lifecycle gate
        env:
          HLTHPRT_PTG2_V3_LIFECYCLE_POSTGRES_DSN: "postgresql://${{ env.HLTHPRT_DB_USER }}:${{ env.HLTHPRT_DB_PASSWORD }}@${{ env.HLTHPRT_DB_HOST }}:${{ env.HLTHPRT_DB_PORT }}/${{ env.HLTHPRT_DB_DATABASE }}"
        run: python -m pytest -q tests/test_ptg2_v3_migrated_lifecycle_postgres.py
      - name: Run candidate attestation reader/writer compatibility gate
        env:
          HLTHPRT_PTG2_ATTESTATION_COMPAT_POSTGRES_TEST: "1"
        run: python -m pytest -q tests/test_ptg2_attestation_contract_compat_postgres.py
      - name: Run MRF discovery checkpoint PostgreSQL gate
        env:
          HLTHPRT_MRF_DISCOVERY_CHECKPOINT_POSTGRES_DSN: "postgresql://${{ env.HLTHPRT_DB_USER }}:${{ env.HLTHPRT_DB_PASSWORD }}@${{ env.HLTHPRT_DB_HOST }}:${{ env.HLTHPRT_DB_PORT }}/${{ env.HLTHPRT_DB_DATABASE }}"
        run: python -m pytest -q tests/test_mrf_discovery_checkpoints_postgres.py
      - name: Run control import admission PostgreSQL gate
        env:
          HLTHPRT_DB_DATABASE: control_imports_test_ci_runner
          PGPASSWORD: ${{ env.HLTHPRT_DB_PASSWORD }}
        run: |
          cleanup_database() {
            dropdb --if-exists \
              --host "$HLTHPRT_DB_HOST" \
              --port "$HLTHPRT_DB_PORT" \
              --username "$HLTHPRT_DB_USER" \
              control_imports_test_ci_runner
          }
          trap cleanup_database EXIT
          createdb \
            --host "$HLTHPRT_DB_HOST" \
            --port "$HLTHPRT_DB_PORT" \
            --username "$HLTHPRT_DB_USER" \
            control_imports_test_ci_runner
          python -m pytest -q tests/test_control_imports_db.py
      - name: Run retained UHC admission PostgreSQL gate
        env:
          HLTHPRT_UHC_RETAINED_ADMISSION_POSTGRES_DSN: "postgresql://${{ env.HLTHPRT_DB_USER }}:${{ env.HLTHPRT_DB_PASSWORD }}@${{ env.HLTHPRT_DB_HOST }}:${{ env.HLTHPRT_DB_PORT }}/uhc_retained_admission_test_ci_runner"
          HLTHPRT_PTG2_RUST_SCANNER_BIN: "${{ github.workspace }}/support/ptg2_scanner/target/debug/ptg2_scanner"
          PGPASSWORD: ${{ env.HLTHPRT_DB_PASSWORD }}
        run: |
          cleanup_database() {
            dropdb --if-exists \
              --host "$HLTHPRT_DB_HOST" \
              --port "$HLTHPRT_DB_PORT" \
              --username "$HLTHPRT_DB_USER" \
              uhc_retained_admission_test_ci_runner
          }
          trap cleanup_database EXIT
          createdb \
            --host "$HLTHPRT_DB_HOST" \
            --port "$HLTHPRT_DB_PORT" \
            --username "$HLTHPRT_DB_USER" \
            uhc_retained_admission_test_ci_runner
          python -m pytest -q \
            tests/test_uhc_retained_admission_postgres.py \
            tests/test_uhc_retained_admission_concurrency_postgres.py
      - name: Run strict shared PTG PostgreSQL publish, graph, and cold-read smoke
        env:
          HLTHPRT_PTG2_AUDIT_BATCH_POSTGRES_TEST: "1"
          HLTHPRT_PTG2_SHARED_PUBLISH_POSTGRES_TEST: "1"
        run: >
          python -m pytest -q
          tests/test_ptg2_candidate_audit_batch_postgres.py
          tests/test_ptg2_shared_graph_postgres.py
          tests/test_ptg2_shared_price_postgres.py
          tests/test_ptg2_shared_snapshot_publish_postgres.py
      - name: Run strict shared PTG PostgreSQL GC and removal tests
        env:
          HLTHPRT_PTG2_SHARED_GC_POSTGRES_TEST: "1"
        run: >
          python -m pytest -q
          tests/test_ptg2_shared_gc.py
          tests/test_ptg_source_snapshot_removal_v3.py
      - name: Run strict shared PTG PostgreSQL cross-plan reuse tests
        env:
          HLTHPRT_PTG2_CROSS_PLAN_POSTGRES_TEST: "1"
        run: python -m pytest -q tests/test_ptg2_v3_cross_plan_reuse.py
      - name: Run address and Provider Directory DB tests
        env:
          HLTHPRT_RETAINED_ARTIFACT_POSTGRES_DSN: "postgresql://${{ env.HLTHPRT_DB_USER }}:${{ env.HLTHPRT_DB_PASSWORD }}@${{ env.HLTHPRT_DB_HOST }}:${{ env.HLTHPRT_DB_PORT }}/${{ env.HLTHPRT_DB_DATABASE }}"
        run: >
          python -m pytest -q
          -o asyncio_default_test_loop_scope=session
          -o asyncio_default_fixture_loop_scope=session
          --durations=20
          tests/test_address_canonical_db.py
          tests/test_npi_geo_evidence_search_db.py
          tests/test_entity_address_unified_archive_coordinates_db.py
          tests/test_npi_phone_evidence_search_db.py
          tests/test_npi_provider_directory_role_evidence_db.py
          tests/test_provider_directory_profile_affiliations_db.py
          tests/test_provider_directory_dataset_serving_relations_db.py
          tests/test_provider_directory_contra_affiliation.py
          tests/test_provider_directory_dataset_artifact_db.py
          tests/test_provider_directory_twin_root_verification_db.py
          tests/test_provider_directory_artifact_eligibility_db.py
          tests/test_provider_directory_artifact_eligibility_refresh_db.py
          tests/test_provider_directory_artifact_scope_bulk_load_db.py
          tests/test_provider_directory_dataset_rehydrate_db.py
          tests/test_provider_directory_two_phase_publication.py
          tests/test_provider_directory_contract_identity_cutover.py
          tests/test_provider_directory_retry_cleanup.py
          tests/test_provider_directory_artifact_cutover_reconciliation.py
          tests/test_provider_directory_retained_campaign_contract.py
          tests/test_provider_directory_retained_private_locator_contract.py
          tests/test_provider_directory_retained_contract_keys.py
          tests/test_provider_directory_retained_private_key_binding.py
          tests/test_provider_directory_retained_sealed_contract.py
          tests/test_provider_directory_retained_source_neutrality.py
          tests/test_provider_directory_retained_core_postgres.py
          tests/test_provider_directory_retained_core_state_guards.py
          tests/test_provider_directory_retained_seal_claim_guards.py
          tests/test_provider_directory_retained_binding_guards.py
          tests/test_provider_directory_retained_root_ledger_guards.py
          tests/test_provider_directory_retained_retry_gc_guards.py
          tests/test_provider_directory_retained_key_fence_status.py
      - name: Upload PostgreSQL coverage data
        uses: actions/upload-artifact@v7
        with:
          name: mrf-python-coverage-postgres
          path: .coverage.postgres
          include-hidden-files: true
          retention-days: 1
