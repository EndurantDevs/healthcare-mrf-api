[run]
branch = True
source_dirs =
    api
    db
    process
    service
source_pkgs =
    main

[report]
ignore_errors = True
include_namespace_packages = True
include =
    main.py
    api/*.py
    api/**/*.py
    db/*.py
    db/**/*.py
    process/*.py
    process/**/*.py
    service/*.py
    service/**/*.py
